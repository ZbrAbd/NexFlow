version: 2

models:
  - name: stg_orders
    description: "Cleaned orders from fact_orders"
    columns:
      - name: order_line_id
        description: "Primary key"
        tests:
          - unique          # no duplicates
          - not_null        # no nulls

      - name: customer_id
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null

      - name: total_amount
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customers from dim_customers"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: email
        tests:
          - not_null